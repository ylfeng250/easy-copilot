name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: v22.13.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build the extension
        run: pnpm build

      - name: Package the extension into a zip artifact
        run: pnpm package

      - name: Get version
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Rename package
        run: mv build/chrome-mv3-prod.zip build/easy-copilot-release-${{ steps.version.outputs.VERSION }}.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: easy-copilot-release-${{ steps.version.outputs.VERSION }}
          path: build/easy-copilot-release-${{ steps.version.outputs.VERSION }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: easy-copilot-release-${{ steps.version.outputs.VERSION }}
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          body: |
            ## Easy Copilot v${{ steps.version.outputs.VERSION }}

            ### 安装方式
            1. 下载 `easy-copilot-release-${{ steps.version.outputs.VERSION }}.zip`
            2. 解压缩文件
            3. 打开 Chrome 浏览器，进入 `chrome://extensions/`
            4. 开启「开发者模式」
            5. 点击「加载已解压的扩展程序」选择解压后的文件夹

            ### 功能
            AI 对话导航助手，快速回溯对话中的提问位置。
          files: |
            release/easy-copilot-release-${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
